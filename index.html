<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MetaTransfer Brand Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Exo+2:wght@900&family=Montserrat:wght@900&family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --logo-size: 60px;
            --main-accent: #00ffcc;
        }

        body {
            margin: 0; padding: 10px;
            display: flex; flex-direction: column;
            min-height: 100vh;
            background-color: #080808;
            color: white;
            font-family: 'Montserrat', sans-serif;
            -webkit-text-size-adjust: 100%;
        }

        .logo-wrapper {
            flex-grow: 1;
            display: flex; justify-content: center; align-items: center;
            padding: 40px 20px;
            background: radial-gradient(circle, #1a1a1a 0%, #080808 100%);
            border-radius: 20px;
            margin-bottom: 10px;
        }

        .logo-container {
            font-size: var(--logo-size) !important; 
            line-height: 1;
            transition: font-family 0.3s ease;
            user-select: none;
        }

        .controls {
            background: #141414;
            padding: 20px;
            border-radius: 25px;
            width: 100%; max-width: 500px;
            margin: 0 auto;
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            border: 1px solid #222;
        }

        .full-width { grid-column: span 2; }

        /* Красивые кнопки */
        .btn-neon {
            background: none;
            border: 2px solid var(--main-accent);
            color: var(--main-accent);
            padding: 12px;
            border-radius: 12px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-neon:active {
            background: var(--main-accent);
            color: #000;
            box-shadow: 0 0 20px var(--main-accent);
        }

        /* Блок информации */
        #brand-info {
            display: none;
            padding: 15px;
            background: #1a1a1a;
            border-radius: 15px;
            margin-top: 10px;
            font-size: 13px;
            border-left: 4px solid var(--main-accent);
        }

        input[type="color"], select {
            width: 100%; height: 45px;
            background: #202020; border: 1px solid #333;
            color: white; border-radius: 12px;
        }

        .download-btn {
            background: var(--main-accent);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 900;
            grid-column: span 2;
        }
    </style>
</head>
<body>

    <div class="logo-wrapper">
        <div id="capture" style="padding: 20px;">
            <div class="logo-container" id="logo">
                <span id="part-meta">Meta</span><span id="part-transfer">Transfer</span>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label style="font-size: 10px; color: #888;">META COLOR</label>
            <input type="color" id="color-meta" value="#00ffcc">
        </div>
        <div class="control-group">
            <label style="font-size: 10px; color: #888;">TRANSFER COLOR</label>
            <input type="color" id="color-transfer" value="#ffffff">
        </div>

        <div class="full-width">
            <select id="font-family">
                <option value="'Montserrat'">Montserrat</option>
                <option value="'Anton'">Anton</option>
                <option value="'Orbitron'">Orbitron</option>
                <option value="'Bebas Neue'">Bebas Neue</option>
            </select>
        </div>

        <button class="btn-neon" onclick="toggleInfo()">О Бренде</button>
        <button class="btn-neon" onclick="randomColor()">Рандом</button>

        <button class="download-btn" id="download-btn">СКАЧАТЬ PNG</button>

        <div id="brand-info" class="full-width">
            <strong>MetaTransfer v1.0</strong><br>
            Инструмент для создания уникального стиля. <br>
            Выбирай цвета, подбирай шрифты и качай лого в один клик.
        </div>
    </div>

    <script>
        const root = document.querySelector(':root');
        const meta = document.getElementById('part-meta');
        const transfer = document.getElementById('part-transfer');
        const logo = document.getElementById('logo');
        const cMeta = document.getElementById('color-meta');
        const cTransfer = document.getElementById('color-transfer');
        const fFamily = document.getElementById('font-family');
        const downloadBtn = document.getElementById('download-btn');

        function updateAll() {
            meta.style.color = cMeta.value;
            transfer.style.color = cTransfer.value;
            logo.style.fontFamily = fFamily.value;
        }

        cMeta.oninput = updateAll;
        cTransfer.oninput = updateAll;
        fFamily.onchange = updateAll;

        function toggleInfo() {
            const info = document.getElementById('brand-info');
            info.style.display = info.style.display === 'block' ? 'none' : 'block';
        }

        function randomColor() {
            const rand = () => '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
            cMeta.value = rand();
            cTransfer.value = rand();
            updateAll();
        }

        // КОРРЕКТНОЕ СКАЧИВАНИЕ
        downloadBtn.onclick = () => {
            downloadBtn.innerText = "ГЕНЕРАЦИЯ...";
            html2canvas(document.getElementById('capture'), {
                backgroundColor: null,
                scale: 3
            }).then(canvas => {
                canvas.toBlob((blob) => {
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.download = `Logo_${Date.now()}.png`;
                    link.href = url;
                    link.click();
                    URL.revokeObjectURL(url);
                    downloadBtn.innerText = "СКАЧАТЬ PNG";
                });
            });
        };
    </script>
</body>
</html>
