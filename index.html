<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MetaTransfer Mobile Fixed</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Exo+2:wght@900&family=Montserrat:wght@900&family=Orbitron:wght@900&family=Oswald:wght@700&family=Syncopate:wght@700&family=Russo+One&family=Stalinist+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --logo-size: 70px; /* Переменная для размера */
        }

        body {
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #050505;
            color: white;
            font-family: 'Montserrat', sans-serif;
            /* Запрещаем браузеру самому менять размер шрифта */
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
            overflow-x: hidden;
        }

        .logo-wrapper {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .logo-container {
            /* Используем переменную для размера */
            font-size: var(--logo-size) !important; 
            line-height: 1;
            width: 100%;
            word-wrap: break-word;
            transition: font-family 0.3s ease;
        }

        #part-meta, #part-transfer {
            display: inline-block;
        }

        .controls {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 25px 25px 0 0; /* Скругляем верх для мобил */
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            box-sizing: border-box;
            border-top: 1px solid #333;
        }

        .full-width { grid-column: span 2; }

        label {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            display: block;
            margin-bottom: 5px;
        }

        input[type="range"] {
            width: 100%;
            height: 25px; /* Увеличили область нажатия для пальца */
            accent-color: #00ffcc;
        }

        input[type="color"], select {
            width: 100%;
            height: 45px;
            background: #252525;
            border: 1px solid #444;
            color: white;
            border-radius: 12px;
            padding: 5px;
        }

        /* Чтобы на мобиле при тапе не было синей рамки */
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>

    <div class="logo-wrapper">
        <div class="logo-container" id="logo">
            <span id="part-meta">Meta</span><span id="part-transfer">Transfer</span>
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Meta Color</label>
            <input type="color" id="color-meta" value="#00ffcc">
        </div>
        
        <div class="control-group">
            <label>Transfer Color</label>
            <input type="color" id="color-transfer" value="#ffffff">
        </div>

        <div class="control-group full-width">
            <label>Размер: <span id="size-val">70</span>px</label>
            <input type="range" id="font-size" min="20" max="150" value="70" style="touch-action: none;">
        </div>

        <div class="control-group full-width">
            <label>Выбрать шрифт</label>
            <select id="font-family">
                <option value="'Montserrat'">Montserrat</option>
                <option value="'Anton'">Anton (Nike style)</option>
                <option value="'Orbitron'">Orbitron (Tesla style)</option>
                <option value="'Bebas Neue'">Bebas Neue</option>
                <option value="'Syncopate'">Syncopate (Luxury)</option>
                <option value="'Stalinist One'">Stalinist (Heavy)</option>
                <option value="'Russo One'">Russo One</option>
            </select>
        </div>
    </div>

    <script>
        const root = document.querySelector(':root');
        const meta = document.getElementById('part-meta');
        const transfer = document.getElementById('part-transfer');
        const logo = document.getElementById('logo');
        
        const cMeta = document.getElementById('color-meta');
        const cTransfer = document.getElementById('color-transfer');
        const fSize = document.getElementById('font-size');
        const fFamily = document.getElementById('font-family');
        const sizeVal = document.getElementById('size-val');

        function updateAll() {
            meta.style.color = cMeta.value;
            transfer.style.color = cTransfer.value;
            // Меняем через CSS переменную — это работает на мобилах стабильнее
            root.style.setProperty('--logo-size', fSize.value + 'px');
            logo.style.fontFamily = fFamily.value;
            sizeVal.innerText = fSize.value;
        }

        // Слушаем и input (для плавности) и change (для фиксации)
        fSize.addEventListener('input', updateAll);
        cMeta.addEventListener('input', updateAll);
        cTransfer.addEventListener('input', updateAll);
        fFamily.addEventListener('change', updateAll);

        updateAll();
    </script>
</body>
</html>
